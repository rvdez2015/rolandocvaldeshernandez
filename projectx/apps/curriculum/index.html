<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Curriculum Centre | Project X</title>

  <link rel="stylesheet" href="/rolandocvaldeshernandez/projectx/assets/projectx.css" />
  <link rel="stylesheet" href="/rolandocvaldeshernandez/projectx/assets/curriculum.css" />
</head>

<body>
  <div class="projectx-shell">
    <div id="projectxSidebar"></div>

    <main class="projectx-main">
      <div id="projectxHeader"></div>

      <section class="projectx-content">
        <div class="projectx-card" style="margin-bottom: 24px;">
          <span class="projectx-status">Production Module</span>
          <h2>Curriculum Centre</h2>
          <p>
            Manage curriculum units, lesson sequences, schemes of work, resources,
            planning evidence and future curriculum exports from one Project X workspace.
          </p>
        </div>

        <div class="module-shell">
          <aside class="module-panel">
            <h3>Curriculum Menu</h3>
            <nav id="moduleNavigation" class="module-nav"></nav>
          </aside>

          <section class="module-workspace">
            <h2 id="moduleTitle" style="margin-top: 0;">Dashboard</h2>
            <div id="moduleWorkspace">
              <div class="projectx-card">Loading Curriculum Centre...</div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script src="/rolandocvaldeshernandez/projectx/core/navigation-manager.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/theme-manager.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/projectx-loader.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/app-shell.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/core/bootstrap.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/services/curriculum-service.js"></script>
  <script src="/rolandocvaldeshernandez/projectx/apps/curriculum/curriculum-module.js"></script>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        await ProjectXCurriculumService.initialise();

        const app = new ProjectXApp({
          moduleKey: "curriculum",
          moduleTitle: "Curriculum Centre",
          moduleSubtitle: "Curriculum planning, sequencing and evidence",
          defaultView: "dashboard"
        });

        await app.initialise();
      } catch (error) {
        console.error("Curriculum Centre failed to start:", error);
        const workspace = document.getElementById("moduleWorkspace");
        if (workspace) {
          workspace.innerHTML = `
            <div class="projectx-card">
              <span class="projectx-status">Error</span>
              <h2>Curriculum Centre could not be loaded</h2>
              <p>Please check the console and confirm that the curriculum data file is available.</p>
            </div>
          `;
        }
      }
    });
  </script>
</body>
</html>
